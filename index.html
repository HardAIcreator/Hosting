<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMBA UPLOADER · загрузить фото</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0b0d17, #1a1035);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .uploader {
            width: 100%;
            max-width: 440px;
            background: rgba(22, 24, 35, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #6200ff, #9d4edd);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }
        .logo-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #b794f4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .upload-area {
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            padding: 40px 20px;
            margin-bottom: 25px;
            border: 2px dashed #9d4edd;
            text-align: center;
            cursor: pointer;
        }
        .upload-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }
        .upload-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .upload-subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        .preview-area {
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 25px;
            display: none;
        }
        .preview-area.show {
            display: block;
        }
        .preview-image {
            width: 100%;
            height: 200px;
            border-radius: 25px;
            overflow: hidden;
            margin-bottom: 15px;
            background: #000;
        }
        .preview-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .link-container {
            background: rgba(0,0,0,0.4);
            border-radius: 30px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .link-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .copy-btn {
            background: #9d4edd;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 16px 30px;
            border-radius: 50px;
            color: white;
            border: 1px solid #9d4edd;
            transition: 0.3s;
            z-index: 1000;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="uploader">
        <div class="logo">
            <div class="logo-icon">📸</div>
            <div class="logo-text">IMBA UPLOAD</div>
        </div>

        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" accept="image/*" style="display: none">
            <div class="upload-icon">📤</div>
            <div class="upload-title">Нажми чтобы выбрать фото</div>
            <div class="upload-subtitle">JPG, PNG, GIF до 50 MB</div>
        </div>

        <div class="preview-area" id="previewArea">
            <div class="preview-image" id="previewImage">
                <img src="" id="previewImg" alt="">
            </div>
            
            <div class="link-container" id="linkContainer" style="display: none;">
                <input type="text" class="link-input" id="linkInput" readonly>
                <button class="copy-btn" onclick="copyLink()">КОПИРОВАТЬ</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">✅ Ссылка скопирована!</div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('previewArea').classList.add('show');
                
                // Генерируем ссылку
                const id = Math.random().toString(36).substring(2, 10);
                const url = window.location.origin + '/viewer.html?id=' + id;
                
                // Сохраняем фото в localStorage (временное решение)
                const photos = JSON.parse(localStorage.getItem('photos') || '{}');
                photos[id] = e.target.result;
                localStorage.setItem('photos', JSON.stringify(photos));
                
                document.getElementById('linkInput').value = url;
                document.getElementById('linkContainer').style.display = 'flex';
            };
            reader.readAsDataURL(file);
        }

        function copyLink() {
            const link = document.getElementById('linkInput');
            link.select();
            document.execCommand('copy');
            
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
  </html>
